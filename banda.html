<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" id="metaDescription" content="Perfil público de banda en Saltillo.">
    <title id="pageTitle">Banda — Saltillo</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="band-profile-panel.css">
    <link rel="stylesheet" href="band-public-profile.css">
</head>
<body class="bpp-public-page">
    <div class="bpp-public-shell">
        <header class="bpp-public-topbar">
            <a href="index.html" class="bpp-public-back">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
                <span data-i18n="bandas.publicBack">Volver al inicio</span>
            </a>
            <a href="#" class="bpp-public-reserve-btn" id="publicReserveBtn" hidden>
                <i class="fas fa-calendar-check" aria-hidden="true"></i>
                <span data-i18n="bandas.publicReserve">Reservar banda</span>
            </a>
        </header>

        <main id="publicBandProfile"></main>

        <div class="bpp-public-empty" id="publicBandNotFound" hidden>
            <p data-i18n="bandas.publicNotFound">No encontramos esta banda.</p>
            <a href="index.html" data-i18n="bandas.publicBack">Volver al inicio</a>
        </div>
    </div>

    <div class="bpp-video-modal" id="bandVideoModal" aria-hidden="true">
        <div class="bpp-video-modal-backdrop" id="bandVideoModalBackdrop"></div>
        <div class="bpp-video-modal-content">
            <button class="bpp-video-modal-close" id="bandVideoModalClose" type="button" aria-label="Cerrar">
                <i class="fas fa-times" aria-hidden="true"></i>
            </button>
            <video id="bandVideoModalPlayer" controls playsinline></video>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="band-public-profile.js"></script>
    <script>
        const publicBandProfile = document.getElementById('publicBandProfile');
        const publicBandNotFound = document.getElementById('publicBandNotFound');
        const publicReserveBtn = document.getElementById('publicReserveBtn');
        const metaDescription = document.getElementById('metaDescription');
        const pageTitle = document.getElementById('pageTitle');

        const videoModal = document.getElementById('bandVideoModal');
        const videoModalBackdrop = document.getElementById('bandVideoModalBackdrop');
        const videoModalClose = document.getElementById('bandVideoModalClose');
        const videoModalPlayer = document.getElementById('bandVideoModalPlayer');

        function t(key, vars = {}) {
            return window.I18n ? window.I18n.t(key, vars) : key;
        }

        async function loadBand(id) {
            try {
                const res = await fetch('bandas.json');
                if (!res.ok) throw new Error('fetch failed');
                const data = await res.json();
                return (data.bandas || []).find(b => b.id === id) || null;
            } catch (_) {
                return null;
            }
        }

        function showNotFound() {
            publicBandProfile.innerHTML = '';
            publicBandProfile.hidden = true;
            publicBandNotFound.hidden = false;
            publicReserveBtn.hidden = true;
            pageTitle.textContent = t('bandas.publicNotFound');
        }

        let currentBanda = null;

        async function renderCurrentBand() {
            if (!currentBanda) return;

            publicBandNotFound.hidden = true;
            publicBandProfile.hidden = false;
            publicReserveBtn.hidden = false;
            publicReserveBtn.href = `index.html?banda=${encodeURIComponent(currentBanda.id)}&reservar=1`;

            const profile = window.BandPublicProfile.render(publicBandProfile, currentBanda, {
                videoModal,
                videoModalBackdrop,
                videoModalClose,
                videoPlayer: videoModalPlayer
            });

            if (profile) {
                pageTitle.textContent = `${profile.nombre} — Saltillo`;
                metaDescription.setAttribute('content', profile.descripcion.slice(0, 155));
            }

            window.I18n.apply();
        }

        async function initPublicBandPage() {
            window.I18n.init();
            window.addEventListener('languagechange', renderCurrentBand);

            const params = new URLSearchParams(window.location.search);
            const bandaId = params.get('banda') || 'gary-garcia';
            currentBanda = await loadBand(bandaId);

            if (!currentBanda) {
                showNotFound();
                window.I18n.apply();
                return;
            }

            await renderCurrentBand();
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && videoModal?.classList.contains('open')) {
                videoModalClose?.click();
            }
        });

        document.addEventListener('DOMContentLoaded', initPublicBandPage);
    </script>
</body>
</html>
