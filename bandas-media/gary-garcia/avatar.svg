<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Gary Garcia">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#2c1810"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffb020" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffb020" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="256" fill="url(#spot)"/>
  <!-- shoulders -->
  <ellipse cx="256" cy="420" rx="160" ry="60" fill="#111"/>
  <!-- neck -->
  <rect x="230" y="280" width="52" height="60" rx="8" fill="#c8956c"/>
  <!-- head -->
  <ellipse cx="256" cy="230" rx="90" ry="100" fill="#c8956c"/>
  <!-- hair -->
  <path d="M170,210 Q180,120 256,110 Q332,120 342,210 Q320,160 256,155 Q192,160 170,210" fill="#1a0a00"/>
  <!-- sunglasses -->
  <rect x="195" y="215" width="55" height="28" rx="6" fill="#0a0a0a"/>
  <rect x="262" y="215" width="55" height="28" rx="6" fill="#0a0a0a"/>
  <rect x="248" y="222" width="16" height="4" fill="#333"/>
  <!-- guitar body -->
  <ellipse cx="256" cy="390" rx="70" ry="55" fill="#2a1810" stroke="#ffb020" stroke-width="2"/>
  <rect x="248" y="290" width="16" height="110" rx="4" fill="#8b6914"/>
  <!-- strings -->
  <line x1="252" y1="295" x2="252" y2="395" stroke="#ccc" stroke-width="0.8" opacity="0.6"/>
  <line x1="256" y1="295" x2="256" y2="395" stroke="#ccc" stroke-width="0.8" opacity="0.6"/>
  <line x1="260" y1="295" x2="260" y2="395" stroke="#ccc" stroke-width="0.8" opacity="0.6"/>
  <!-- border ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#accent)" stroke-width="4"/>
  <!-- initials badge -->
  <text x="256" y="490" text-anchor="middle" fill="#00d4ff" font-family="system-ui,sans-serif" font-size="22" font-weight="700" letter-spacing="3">GG</text>
</svg>
