<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 480" role="img" aria-label="Gary Garcia en vivo">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="45%" stop-color="#3d1f00"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b00"/>
      <stop offset="100%" stop-color="#ffb020"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="1400" height="480" fill="url(#sky)"/>
  <circle cx="1100" cy="120" r="70" fill="url(#sun)" opacity="0.85"/>
  <ellipse cx="700" cy="520" rx="900" ry="180" fill="url(#glow)"/>
  <!-- crowd silhouettes -->
  <g fill="#0a0a0a" opacity="0.7">
    <ellipse cx="200" cy="400" rx="120" ry="30"/>
    <ellipse cx="500" cy="410" rx="160" ry="35"/>
    <ellipse cx="900" cy="405" rx="140" ry="32"/>
    <ellipse cx="1200" cy="400" rx="100" ry="28"/>
  </g>
  <!-- stage lights -->
  <g opacity="0.5" filter="url(#blur)">
    <polygon points="350,0 420,480 280,480" fill="#00d4ff" opacity="0.25"/>
    <polygon points="700,0 820,480 580,480" fill="#8b5cf6" opacity="0.2"/>
    <polygon points="1050,0 1120,480 980,480" fill="#ff6b00" opacity="0.2"/>
  </g>
  <!-- stage platform -->
  <rect x="0" y="380" width="1400" height="100" fill="#111"/>
  <rect x="0" y="378" width="1400" height="4" fill="#00d4ff" opacity="0.6"/>
  <!-- band silhouettes -->
  <g fill="#1a1a2e" stroke="#00d4ff" stroke-width="1.5" opacity="0.9">
    <!-- drummer -->
    <ellipse cx="420" cy="355" rx="22" ry="28"/>
    <rect x="395" y="320" width="50" height="8" rx="2" fill="#2a2a4a"/>
    <!-- guitarist center -->
    <ellipse cx="700" cy="340" rx="28" ry="35"/>
    <line x1="680" y1="310" x2="640" y2="260" stroke="#ffb020" stroke-width="3"/>
    <line x1="720" y1="310" x2="760" y2="255" stroke="#ffb020" stroke-width="3"/>
    <!-- bassist -->
    <ellipse cx="980" cy="348" rx="24" ry="32"/>
    <line x1="965" y1="318" x2="930" y2="275" stroke="#8b5cf6" stroke-width="3"/>
  </g>
  <!-- desert mountains -->
  <polygon points="0,380 180,280 360,380" fill="#2c1810" opacity="0.6"/>
  <polygon points="200,380 480,220 760,380" fill="#1a0f08" opacity="0.7"/>
  <polygon points="700,380 1000,240 1300,380" fill="#2c1810" opacity="0.6"/>
  <text x="700" y="440" text-anchor="middle" fill="#00d4ff" font-family="system-ui,sans-serif" font-size="28" font-weight="700" letter-spacing="8" opacity="0.9">GARY GARCIA</text>
  <text x="700" y="468" text-anchor="middle" fill="#ffb020" font-family="system-ui,sans-serif" font-size="13" letter-spacing="4" opacity="0.8">DESERT ROCK · SALTILLO</text>
</svg>
