# Hecho en Saltillo — qau.ironslash.com
# Ruta del proyecto: /home/ivanam/projects/rd
#
# En el servidor:
#   sudo cp deploy/nginx-qau.ironslash.com.conf /etc/nginx/sites-available/qau.ironslash.com
#   sudo ln -sf /etc/nginx/sites-available/qau.ironslash.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name qau.ironslash.com www.qau.ironslash.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name qau.ironslash.com www.qau.ironslash.com;

    ssl_certificate     /etc/letsencrypt/live/qau.ironslash.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qau.ironslash.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/ivanam/projects/rd;
    index index.html;

    access_log /var/log/nginx/qau.ironslash.com.access.log;
    error_log  /var/log/nginx/qau.ironslash.com.error.log;

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|jpg|jpeg|png|gif|webp|svg|ico|woff|woff2|mp3|wav|json)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
